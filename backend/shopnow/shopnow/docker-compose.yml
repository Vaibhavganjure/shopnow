version: "3.9"

services:
  chromadb:
    container_name: chromadb
    image: ghcr.io/chroma-core/chroma:0.4.15
    environment:
      IS_PERSISTENT: "TRUE"
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    restart: unless-stopped

volumes:
  chroma-data:
    driver: local
